color_s3 = '#eceff4'
color_f1 = '#8fbcbb'
color_f2 = '#88c0d0'
color_f3 = '#81a1c1'
color_f4 = '#5e81ac'
color_a1 = '#bf616a'
color_a2 = '#d08770'
color_a3 = '#ebcb8b'
color_a4 = '#a3be8c'
color_a5 = '#b48ead'

