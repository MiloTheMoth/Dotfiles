[character]
format = "$symbol "
success_symbol = "[ :3 ->](bold color_f1)"
error_symbol = "[ :c ->](bold color_a1)"

[os]
disabled = false
style = "bold color_f4"

[username]
show_always = true
style_user = "bold color_f2"
style_root = "bold color_a5"
format = "[$user]($style) "
disabled = false

[directory]
home_symbol = "’æŁ "
format = '[$path]($style)[$read_only]($read_only_style)'
style = 'bold color_a5'
repo_root_style = 'bold color_a2'
read_only = " ’æ¢ "
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’Éē "
"Music" = "’Ćü "
"Pictures" = "’ĆŠ "

[cmd_duration]
format = "[ ’öĀ $duration](italic color_s3)"

[git_branch]
symbol = "’Éś"
format = '[$symbol $branch ]($style)'
style = "bold color_a2"

[git_status]
format = '[$all_status$ahead_behind]($style)'
style = "bold color_a2"
ahead = ">"
behind = "<"
diverged = "<|>"
renamed = "r"
deleted = "x"

[time]
disabled = false
format = "[ $time]($style)"
time_format = "%R"
utc_time_offset = "local"
style = "color_s1"
